<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Donnybrook Garage Duty Lookup</title>
<style>
:root{
--nav:#080e1c;--nav2:#0f1a2e;--nav3:#0d1726;
--yel:#F9BE00;--grn:#00c48c;--grn-bg:rgba(0,196,140,.12);
--blu:#06c0e0;--blu-bg:rgba(6,192,224,.12);
--teal:#0ff0cc;--teal-dim:rgba(0,255,200,.08);
--red:#e84040;--red-bg:rgba(232,64,64,.14);
--amb:#F9BE00;--amb-bg:rgba(249,190,0,.16);
--wht:#e8f0fe;--mut:#4a6a8a;--fnt:#2a4060;
--mono:"IBM Plex Mono",monospace;--disp:"Bricolage Grotesque",sans-serif;--body:"Hanken Grotesque",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--nav);color:var(--wht);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;padding-top:40px}
.screen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.hidden{display:none!important}
/* WELCOME */
#welcome{align-items:center;justify-content:center;gap:18px;padding:48px 28px;background:linear-gradient(155deg,#080e1c 0%,#051020 60%,#031228 100%);position:relative}
.db-badge{width:100px;height:100px;border-radius:26px;background:linear-gradient(135deg,#F9BE00,#ff9900);display:grid;place-items:center;box-shadow:0 0 0 1px rgba(249,190,0,.3),0 12px 50px rgba(249,190,0,.35),0 0 80px rgba(249,190,0,.12);margin-bottom:6px}
.db-badge span{font-family:var(--disp);font-weight:800;font-size:44px;color:#080e1c;letter-spacing:-2px}
.safety-banner{background:#D32F2F;color:#fff;font-family:var(--disp);font-weight:800;font-size:13px;text-align:center;padding:10px 12px;letter-spacing:.06em;text-transform:uppercase;width:100%;box-sizing:border-box;position:fixed;top:0;left:0;right:0;z-index:9999;animation:pulse-warn 2s ease-in-out infinite;border-bottom:3px solid #FF6F00}
@keyframes pulse-warn{0%,100%{background:#D32F2F}50%{background:#B71C1C}}
#welcome h1{font-family:var(--disp);font-size:36px;font-weight:800;color:var(--yel);text-align:center;letter-spacing:-.03em}
#welcome h2{font-family:var(--disp);font-size:22px;font-weight:700;color:var(--blu);text-align:center;letter-spacing:.01em}
#welcome p{font-size:15px;color:#3a5878;text-align:center;margin:4px 0 20px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase}
.btn-start{background:linear-gradient(135deg,#F9BE00,#ff9900);color:#080e1c;font-family:var(--disp);font-weight:800;font-size:22px;border:0;border-radius:18px;padding:20px 0;cursor:pointer;width:100%;max-width:340px;box-shadow:0 0 0 1px rgba(249,190,0,.4),0 6px 36px rgba(249,190,0,.4);letter-spacing:-.01em;transition:.15s}
.btn-start:active{transform:scale(.97)}
.ver{font-family:var(--mono);font-size:11px;color:var(--fnt);position:absolute;bottom:100px;text-align:center}
.upd-foot{font-family:var(--mono);font-size:11px;color:var(--fnt);text-align:center;padding:18px 0 24px}
/* BUS ANIMATION */
#welcome{padding-bottom:106px}
.road-wrap{position:absolute;bottom:0;left:0;right:0;height:106px;overflow:hidden}
.road-surface{position:absolute;inset:0;background:#040910}
.road-kerb{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00c48c,#F9BE00,#06c0e0)}
.road-line{position:absolute;top:58px;left:0;width:400%;height:2px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.18) 0 50px,transparent 50px 110px);animation:rscroll .75s linear infinite}
@keyframes rscroll{to{transform:translateX(-110px)}}
.bus-outer{position:absolute;bottom:10px;line-height:0}
.bus-outer.b1{animation:brun1 12s linear infinite}
.bus-outer.b2{animation:brun2 17s linear -5s infinite}
.bus-outer.b3{animation:brun3 22s linear -11s infinite}
@keyframes brun1{from{transform:translateX(105vw)}to{transform:translateX(-300px)}}
@keyframes brun2{from{transform:translateX(105vw)}to{transform:translateX(-230px)}}
@keyframes brun3{from{transform:translateX(105vw)}to{transform:translateX(-160px)}}

.stripe{position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#00c48c 0%,#F9BE00 50%,#06c0e0 100%)}
.admin-link{position:absolute;top:52px;right:16px;background:rgba(6,192,224,.1);border:1px solid rgba(6,192,224,.25);color:var(--blu);font-family:var(--mono);font-size:11px;font-weight:700;border-radius:8px;padding:6px 12px;text-decoration:none;letter-spacing:.06em;text-transform:uppercase;transition:.15s}
.admin-link:hover{background:rgba(6,192,224,.2);border-color:rgba(6,192,224,.5)}
/* SEARCH */
#search{background:var(--nav)}
.shdr{background:var(--nav3);padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #F9BE00}
.admin-btn{background:rgba(6,192,224,.1);border:1px solid rgba(6,192,224,.25);color:var(--blu);font-family:var(--mono);font-size:11px;font-weight:700;border-radius:8px;padding:7px 11px;cursor:pointer;text-decoration:none;letter-spacing:.04em;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.admin-btn:hover{background:rgba(6,192,224,.2)}
.back-btn{background:none;border:1.5px solid rgba(255,255,255,.2);color:var(--wht);border-radius:10px;padding:8px 14px;font-size:18px;cursor:pointer;line-height:1}
.db-sm{width:38px;height:38px;border-radius:10px;background:var(--yel);display:grid;place-items:center;flex:none}
.db-sm span{font-family:var(--disp);font-weight:800;font-size:17px;color:var(--nav)}
.hdr-t{font-family:var(--disp);font-weight:700;font-size:18px;flex:1}
.sbody{padding:22px 16px;display:flex;flex-direction:column;gap:18px}
.flbl{font-family:var(--body);font-size:12px;font-weight:700;color:var(--blu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
#duty-q{width:100%;background:var(--nav2);border:2.5px solid rgba(6,192,224,.25);border-radius:14px;color:var(--wht);font-family:var(--mono);font-size:24px;padding:16px 18px;outline:none;letter-spacing:.04em}
#duty-q:focus{border-color:var(--yel);box-shadow:0 0 0 4px rgba(249,190,0,.15)}
#duty-q::placeholder{color:var(--fnt);font-size:15px;letter-spacing:0}
.dtabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dtab{border:2px solid rgba(255,255,255,.1);background:var(--nav2);color:var(--mut);font-family:var(--disp);font-weight:700;font-size:15px;padding:15px 4px;border-radius:12px;cursor:pointer;text-align:center;transition:.14s}
.dtab.on{background:var(--blu);border-color:var(--blu);color:#080e1c;font-weight:800;box-shadow:0 2px 14px rgba(6,192,224,.4)}
.btn-srch{background:var(--grn);color:var(--wht);font-family:var(--disp);font-weight:800;font-size:20px;border:0;border-radius:15px;padding:20px;cursor:pointer;width:100%;box-shadow:0 4px 20px rgba(0,154,68,.4)}
#res{padding:0 16px 40px}
/* MATCHES */
.mlist{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.mitem{background:var(--nav2);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px}
.mitem:active{background:var(--nav3)}
.mnum{font-family:var(--disp);font-weight:800;font-size:27px;color:var(--yel);min-width:58px}
.minfo{flex:1}.mtimes{font-family:var(--mono);font-size:16px}.mzone{font-size:12px;color:var(--mut);margin-top:2px}
.marr{color:var(--fnt);font-size:22px}
/* CARD */
.card{background:var(--nav2);border-radius:22px;overflow:hidden;border:1px solid rgba(6,192,224,.2);margin-top:10px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
.card-hdr{background:var(--nav3);padding:18px 18px 16px;border-bottom:3px solid #F9BE00}
.c-rte{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blu);letter-spacing:.06em;margin-bottom:4px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.c-num{font-family:var(--disp);font-weight:800;font-size:34px;color:var(--yel);line-height:1}
.c-times{font-family:var(--mono);font-size:21px;font-weight:600;margin-top:10px;display:flex;align-items:center;gap:10px}
.c-lbl{font-family:var(--body);font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;display:block}
.c-arr{color:var(--fnt)}
.c-tag{font-family:var(--body);font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;margin-left:6px}
.c-tag.s{color:var(--grn);background:var(--grn-bg)}.c-tag.r{color:var(--amb);background:var(--amb-bg)}
.stype{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;border-radius:6px;padding:3px 9px;text-transform:uppercase;letter-spacing:.06em;margin-left:6px}
.st-EARLY{background:rgba(255,160,0,.15);color:#FFB300;border:1px solid rgba(255,160,0,.3)}
.st-BOGEY{background:rgba(156,39,176,.15);color:#CE93D8;border:1px solid rgba(156,39,176,.3)}
.st-RELIEF{background:rgba(0,150,136,.15);color:#4DB6AC;border:1px solid rgba(0,150,136,.3)}
.st-LATE{background:rgba(30,136,229,.15);color:#64B5F6;border:1px solid rgba(30,136,229,.3)}
.st-NIGHT{background:rgba(100,80,200,.15);color:#9FA8DA;border:1px solid rgba(100,80,200,.3)}
.st-EARLY_WO{background:rgba(255,111,0,.16);color:#FF8A3D;border:1px solid rgba(255,111,0,.35)}
.sec-t{font-family:var(--body);font-size:12px;font-weight:700;color:var(--blu);letter-spacing:.1em;text-transform:uppercase;padding:14px 18px 8px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.tplist{padding:4px 10px 10px;display:flex;flex-direction:column;gap:4px}
.tc-mountjoy{border-left:4px solid #00A5DF!important}
.tc-bridesglen{border-left:4px solid #009A44!important}
.tc-loughlinstown{border-left:4px solid #E53935!important}
.tc-poolbeg{border-left:4px solid #F9BE00!important}
.tc-belarmine{border-left:4px solid #9C27B0!important}
.tc-dundrum{border-left:4px solid #F9BE00!important}
.tc-dun-laoghaire{border-left:4px solid #00A5DF!important}
.tpr{display:grid;grid-template-columns:94px 1fr;gap:10px;align-items:center;padding:12px 10px;border-radius:12px;background:rgba(255,255,255,.04)}
.tpt{font-family:var(--mono);font-weight:600;font-size:18px;white-space:nowrap}
.tpn{font-family:var(--disp);font-weight:700;font-size:16px}
.tpl{font-family:var(--body);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-left:7px;opacity:.9}
.tp-rte{font-family:var(--mono);font-size:10px;font-weight:700;margin-left:8px;background:rgba(255,255,255,.14);padding:2px 7px;border-radius:5px;letter-spacing:.04em;vertical-align:middle}
.hrs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 14px 14px}
.hbox{background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center}
.hk{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
.hv{font-family:var(--mono);font-size:21px;font-weight:600;margin-top:4px}
.hbox.w .hv{color:var(--grn)}.hbox.b .hv{color:var(--blu)}
.cbox{background:rgba(0,165,223,.1);border:1px solid rgba(0,165,223,.3);border-radius:15px;margin:0 14px 14px;padding:14px 16px}
.ct{font-size:12px;font-weight:700;color:var(--blu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.clink{display:flex;align-items:center;gap:12px;text-decoration:none;padding:4px 0}
.cico{width:44px;height:44px;border-radius:12px;background:var(--blu);display:grid;place-items:center;flex:none;font-size:22px}
.cnum{font-family:var(--mono);font-weight:600;font-size:19px;color:var(--wht)}
.crte{font-size:12px;color:var(--mut)}
.btn-again{margin:0 14px 20px;background:transparent;border:2px solid rgba(255,255,255,.12);color:var(--wht);font-family:var(--disp);font-weight:700;font-size:16px;border-radius:13px;padding:15px;cursor:pointer;display:block;width:calc(100% - 28px);text-align:center}
.nores{text-align:center;padding:44px 16px;color:var(--mut);font-family:var(--mono);font-size:14px;line-height:1.8}
.sect-lbl{font-size:13px;font-weight:700;color:var(--blu);letter-spacing:.06em;text-transform:uppercase;padding:14px 0 10px}
/* ROUTE VIEW */
.c-rte{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-decoration-color:rgba(0,165,223,.5)}
.card-hdr{position:relative}
.btn-dl{position:absolute;top:0;right:0;background:#F9BE00;border:none;color:#1D3462;font-family:var(--body);font-weight:700;font-size:11px;border-radius:10px;padding:7px 12px;cursor:pointer;letter-spacing:.01em;box-shadow:0 2px 8px rgba(0,0,0,.18);white-space:nowrap}
.btn-dl,.c-rte,.btn,button{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.btn-dl:active{background:#e0a800;transform:scale(.97)}
.c-tm{font-family:var(--mono);font-size:12px;color:var(--mut);letter-spacing:.04em;margin-top:2px;display:flex;align-items:center;gap:6px}
.c-tm b{color:var(--yel);font-weight:700}
.c-tm .tm-ico{font-size:14px;line-height:1}
.rv-hdr{background:var(--nav3);padding:18px 16px;border-bottom:2px solid var(--yel)}
.rv-rte{font-family:var(--disp);font-weight:800;font-size:28px;color:var(--yel)}
.rv-termini{font-family:var(--body);font-size:14px;color:var(--blu);margin-top:4px}
.rv-dirtabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px 0}
.rv-dirtab{border:2px solid rgba(255,255,255,.1);background:var(--nav2);color:var(--mut);font-family:var(--body);font-weight:700;font-size:13px;padding:12px 6px;border-radius:11px;cursor:pointer;text-align:center}
.rv-dirtab.on{background:var(--blu);border-color:var(--blu);color:var(--wht)}
.rv-list{padding:14px 16px 30px;display:flex;flex-direction:column;gap:0}
.rv-stop{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;text-decoration:none;color:inherit}
.rv-stop:active{background:rgba(255,255,255,.04)}
.rv-num{font-family:var(--mono);font-size:12px;color:var(--fnt);min-width:28px}
.rv-name{font-family:var(--body);font-size:15px;flex:1}
.rv-pin{font-size:16px;opacity:.6}
.rv-note{padding:14px 16px;font-size:13px;color:var(--mut);font-family:var(--body);line-height:1.6}
</style>
</head>

    const nm3=(merged[i][0]||'').toLowerCase();
    if(!nm3.includes('garage')&&!nm3.includes('dbrk')){spclSet.add(i);break;}
   }
  }
 }
 // DZ4: Ballywaltrim/Northwood → SPCL only when destination is Garage
 if(z==='Zone 4'){
  const dz4T=['ballywaltrim','northwood'];
  const fl4=(ln(d.finish_loc)||d.finish_loc||'').toLowerCase();
  const bl4=(ln(d.break_loc)||d.break_loc||'').toLowerCase();
  // End-of-duty at Garage → last Ballywaltrim/Northwood before END gets SPCL
  if(toGarage(fl4)){
   for(let i=mn-1;i>=0;i--){
    if(merged[i][2]==='__END__')continue;
    const nm=(merged[i][0]||'').toLowerCase();
    if(dz4T.some(h=>nm.includes(h))){spclSet.add(i);}
    break;
   }
  }
  // Break at Garage → last Ballywaltrim/Northwood before break gets SPCL
  if(bsm!==null&&toGarage(bl4)){
   for(let i=mn-1;i>=0;i--){
    if(merged[i][2]==='__END__')continue;
    const t=sm(merged[i][1]),nm=(merged[i][0]||'').toLowerCase();
    if(t<bsm){
     if(dz4T.some(h=>nm.includes(h))){spclSet.add(i);}
     break;
    }
   }
  }
 }
 const tpsData=[];
 // Build rows as an ARRAY (not a joined string) so handover rows can be
 // spliced in at exact index positions -- robust against any future markup
 // changes (e.g. terminus-colour classes), unlike fragile string-searching.
 let breakRowIdx=-1, resumeRowIdx=-1;
 const tpRows=merged.map((s,i)=>{
  let lab='';
  if(i===0)lab='Start';
  else if(i===mn-1&&!spclSet.has(i)&&s[2]!=='__END__')lab='Terminus';
  if(s[2]==='__END__'){lab='END';}
  else if(bsm!==null&&Math.abs(sm(s[1])-bsm)<=10)lab='Break';
  else if(prm!==null&&Math.abs(sm(s[1])-prm)<=10)lab='Resume';
  else if(spclSet.has(i))lab='SPCL';
  if(lab==='Break')breakRowIdx=i;
  if(lab==='Resume')resumeRowIdx=i;
  // Special stops always get their colour; keyed (Start/Terminus) get hash; others white
  const isKeyed=lab!=='';
  const special=stopSpecial(s[0],lab);
  const c=special?special:(isKeyed?scl(s[0]):'#ffffff');
  const sty=(special||isKeyed)?`background:${c}22;box-shadow:inset 4px 0 0 ${c}`:`background:rgba(255,255,255,.04)`;
  const rteTag=(z==='Zone 1'&&special&&!isKeyed)?dz1Route(merged,i):'';
  tpsData.push([s[1],s[0]+(rteTag?` (${rteTag})`:''),lab]);
  const _tc=termColour(s[0]);
  return `<div class="tpr ${_tc}" style="${sty}"><span class="tpt" style="color:${c}">${s[1]}</span><span class="tpn" style="color:${c}">${s[0]}${rteTag?`<span class="tp-rte" style="color:${c}">${rteTag}</span>`:''}${lab?`<span class="tpl">${lab}</span>`:''}</span></div>`;
 });
 // ── Handover arrows ──────────────────────────────────────────────────────
 const hw=d.handovers||[];
 const tb=(d.roster||'').split('/').pop(); // board number e.g. "43" or "14X"
 function hdoRow(fr,ti,cls){
   const arr='<span class="hdo-sep">&#8594;</span>';
   return `<div class="hdo ${cls}">${fr}${arr}${ti}</div>`;
 }
 let hdoPre='',hdoMidOut='',hdoMidIn='',hdoPost='';
 if(hw.length>0){
   const r1=hw[0];
   const r2=hw.length>1?hw[1]:null;
   if(r1.from)hdoPre=hdoRow(r1.from,tb,'hdo-in');
   if(r2){
     if(r1.to)hdoMidOut=hdoRow(tb,r1.to,'hdo-out');
     if(r2.from)hdoMidIn=hdoRow(r2.from,tb,'hdo-in');
   }
   const rLast=r2||r1;
   if(rLast.to)hdoPost=hdoRow(tb,rLast.to,'hdo-out');
 }
 // Splice handover rows into the array at the exact Break/Resume positions,
 // working from the END of the array first so earlier indices stay valid.
 if(resumeRowIdx>-1&&hdoMidIn)tpRows.splice(resumeRowIdx,0,hdoMidIn);
 if(breakRowIdx>-1&&hdoMidOut)tpRows.splice(breakRowIdx+1,0,hdoMidOut);
 let tps=(hdoPre?hdoPre:'')+tpRows.join('')+(hdoPost?hdoPost:'');
 const cs=ctrl(rte);
 const cHtml=cs?`<div class="cbox"><div class="ct">&#128222; Controller</div>${cs.map(c=>`<a class="clink" href="tel:${c.t}"><div class="cico">&#128222;</div><div><div class="cnum">${c.p}</div><div class="crte">Route ${rte} Controller</div></div></a>`).join('')}</div>`:'';
 const ovTag=ov(d)?`<sup style="color:var(--amb);font-size:11px">+1</sup>`:'';
 window._curCard={roster:d.roster,rte:rte||'',on:d.report||'',off:d.sign_off||'',tag:d.break_start?'Split':'Straight',shift:(shiftType(d,z)==='EARLY_WO'?'Early & Workout':shiftType(d,z)),tm:(d.duty||'').replace(/\D/g,'').slice(-3).padStart(3,'0'),worked:d.work||'',brk:d.relief||'',total:d.spread||'',rows:tpsData};
 return `<div class="card"><div class="card-hdr">${rte?`<div class="c-rte" onclick="openRouteView('${rte.replace(/'/g,"\\'")}')">Route ${rte} &rsaquo;</div>`:''}
  <button class="btn-dl" onclick="downloadDutyXLSX()" title="Download CSV file">&#128190; Save &mdash; Download file</button>
  <div class="c-num">${norm(d.roster)}</div>
  <div class="c-date">&#128197; ${(()=>{const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();})()}</div>
  <div class="c-tm"><span class="tm-ico">&#127915;</span>Ticket Machine <b>${(d.duty||'').replace(/\D/g,'').slice(-3).padStart(3,'0')}</b></div>
  <div class="c-times"><div><span class="c-lbl">On</span>${d.report||'--'}</div><span class="c-arr">&rarr;</span><div><span class="c-lbl">Off</span>${d.sign_off||'--'}${ovTag}</div>${(()=>{const st=shiftType(d,z);const stLabel=st==='EARLY_WO'?'Early & Workout':st;return st?`<span class="stype st-${st}">${stLabel}</span>`:''})()}</div>
 </div>
 <div class="sec-t">Timing points</div><div class="tplist">${tps}</div>
 <div class="sec-t">Hours</div>
 <div class="hrs"><div class="hbox w"><div class="hk">Worked</div><div class="hv">${d.work||'--'}</div></div><div class="hbox b"><div class="hk">Break</div><div class="hv">${d.relief||'--'}</div></div><div class="hbox"><div class="hk">Total</div><div class="hv">${d.spread||'--'}</div></div></div>
 ${cHtml}
 <button class="btn-again" onclick="document.getElementById('res').innerHTML='';document.getElementById('duty-q').focus()">&larr; Search Another Duty</button>
 <div style="text-align:center;padding-bottom:12px;font-family:var(--mono);font-size:11px;color:var(--fnt)">${d.roster} &bull; ${z} &bull; ${g}</div>
 </div>`;
}

async function downloadDutyXLSX(){
  const c=window._curCard;
  if(!c){alert('Open a duty card first, then tap Save.');return;}
  const rows=[
    ['Roster',c.roster||''],['Route',c.rte||''],
    ['Ticket Machine',c.tm||''],['On',c.on||''],
    ['Off',c.off||''],['Type',c.tag||''],['Shift',c.shift||''],
    [],['Time','Stop','Note'],
    ...(c.rows||[])
  ];
  rows.push([],['Worked',c.worked||''],['Break',c.brk||''],['Total',c.total||'']);
  const esc=v=>{v=String(v==null?'':v);return/[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv='\ufeff'+rows.map(r=>r.map(esc).join(',')).join('\r\n');
  const fname=(c.roster||'duty').replace(/[\\/]/g,'_')+(c.rte?'_'+c.rte.replace(/\//g,'-'):'')+'.csv';
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  // Strategy 1: Web Share API — iOS 15+ opens native Share Sheet (Save to Files, AirDrop, etc.)
  try{
    const file=new File([blob],fname,{type:'text/csv'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:fname});
      return;
    }
  }catch(e){if(e.name==='AbortError')return;}
  // Strategy 2: <a download> — works on desktop Chrome/Firefox/Edge
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fname;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    return;
  }catch(e){}
  // Strategy 3: Clipboard fallback — paste into Notes/Sheets manually
  try{
    await navigator.clipboard.writeText(csv);
    alert('Copied to clipboard!\nPaste into Notes or Google Sheets.');
  }catch(e){
    alert('Save not supported on this browser.\nTry opening in Safari or Chrome.');
  }
}

// ---- ROUTE VIEW ----
let _rvDir='out';
function gmaps(name){
  const q=encodeURIComponent(name.replace(/\(.*?\)/g,'').trim()+', Dublin, Ireland');
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}
function openRouteView(rteStr){
  // rteStr may be "11/11B" or "E1" etc - take the first code
  const codes=rteStr.split('/').map(s=>s.trim()).filter(Boolean);
  // Prefer a code that has full data, else first termini-only, else first code
  let code=codes.find(c=>ROUTE_STOPS.full[c]) || codes.find(c=>ROUTE_STOPS.termini_only[c]) || codes[0];
  _rvDir='out';
  renderRouteView(code);
  document.getElementById('search').classList.add('hidden');
  document.getElementById('routeview').classList.remove('hidden');
}
function closeRouteView(){
  document.getElementById('routeview').classList.add('hidden');
  document.getElementById('search').classList.remove('hidden');
}
window.setRVDir=dir=>{_rvDir=dir;renderRouteView(window._rvCode);};
function renderRouteView(code){
  window._rvCode=code;
  const full=ROUTE_STOPS.full[code];
  const body=document.getElementById('rv-body');
  if(full){
    const [a,b]=full.termini;
    const stops=_rvDir==='out'?full.out:full.in;
    const fromTo=_rvDir==='out'?`${a} &rarr; ${b}`:`${b} &rarr; ${a}`;
    body.innerHTML=`
      <div class="rv-hdr"><div class="rv-rte">Route ${code}</div><div class="rv-termini">${fromTo}</div></div>
      <div class="rv-dirtabs">
        <button class="rv-dirtab ${_rvDir==='out'?'on':''}" onclick="setRVDir('out')">${a} &rarr; ${b}</button>
        <button class="rv-dirtab ${_rvDir==='in'?'on':''}" onclick="setRVDir('in')">${b} &rarr; ${a}</button>
      </div>
      <div class="rv-list">${stops.map((s,i)=>`<a class="rv-stop" href="${gmaps(s)}" target="_blank" rel="noopener"><span class="rv-num">${i+1}</span><span class="rv-name">${s}</span><span class="rv-pin">&#128205;</span></a>`).join('')}</div>`;
    return;
  }
  const t=ROUTE_STOPS.termini_only[code];
  if(t){
    const [a,b]=t;
    body.innerHTML=`
      <div class="rv-hdr"><div class="rv-rte">Route ${code}</div><div class="rv-termini">${a} &harr; ${b}</div></div>
      <div class="rv-note">Full stop list not yet available for this route. Tap a terminus below to view it on the map.</div>
      <div class="rv-list">
        <a class="rv-stop" href="${gmaps(a)}" target="_blank" rel="noopener"><span class="rv-num">1</span><span class="rv-name">${a}</span><span class="rv-pin">&#128205;</span></a>
        <a class="rv-stop" href="${gmaps(b)}" target="_blank" rel="noopener"><span class="rv-num">2</span><span class="rv-name">${b}</span><span class="rv-pin">&#128205;</span></a>
      </div>`;
    return;
  }
  body.innerHTML=`<div class="rv-note">No route data available for Route ${code}.</div>`;
}
